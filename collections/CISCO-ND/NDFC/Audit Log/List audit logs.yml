info:
  name: List audit logs
  type: http
  seq: 1

http:
  method: GET
  url: https://{{server-address}}/appcenter/cisco/ndfc/api/v1/l4l7-service/fabrics/:fabricName/audit-logs
  headers:
    - name: cookie
      value: AuthCookie={{token}}
  params:
    - name: user-name
      value: admin
      type: query
      disabled: true
    - name: start-time
      value: "1675232200"
      type: query
      disabled: true
    - name: end-time
      value: "1675232211"
      type: query
      disabled: true
    - name: include-request
      value: "true"
      type: query
      disabled: true
    - name: trace-id
      value: 0150d-00ad-47e4-85ad-fd8be30c7d2f
      type: query
      disabled: true
    - name: fabricName
      value: FC_sw
      type: path
  body:
    type: json
    data: // /api/v1/schemas/{id}/templates/{templateName}/anps/{anpName}/epgs/{epgName}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
