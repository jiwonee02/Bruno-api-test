info:
  name: Get Alarm by ID
  type: http
  seq: 1

http:
  method: GET
  url: https://{{server-address}}/appcenter/cisco/ndfc/api/v1/alarm/alarms/alarmbyid?alarmid=123
  headers:
    - name: cookie
      value: AuthCookie={{token}}
  params:
    - name: alarmid
      value: "123"
      type: query
  body:
    type: json
    data: // /api/v1/schemas/{id}/templates/{templateName}/anps/{anpName}/epgs/{epgName}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
