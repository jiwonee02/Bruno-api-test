info:
  name: Get Alarm Count By scope & Category
  type: http
  seq: 16

http:
  method: GET
  url: https://{{server-address}}/appcenter/cisco/ndfc/api/v1/alarm/alarms/scopealarmcategorycount
  headers:
    - name: cookie
      value: AuthCookie={{token}}
  params:
    - name: scopeName
      value: ""
      type: query
      disabled: true
    - name: category
      value: ""
      type: query
      disabled: true
    - name: switchIp
      value: ""
      type: query
      disabled: true
  body:
    type: json
    data: // /api/v1/schemas/{id}/templates/{templateName}/anps/{anpName}/epgs/{epgName}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
