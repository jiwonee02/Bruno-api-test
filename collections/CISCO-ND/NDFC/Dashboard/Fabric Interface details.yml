info:
  name: Fabric Interface details
  type: http
  seq: 1

http:
  method: GET
  url: https://{{server-address}}/appcenter/cisco/ndfc/api/v1/lan-fabric/rest/dashboard/fabric/interface?navId=-1
  headers:
    - name: cookie
      value: AuthCookie={{token}}
  params:
    - name: navId
      value: "-1"
      type: query
  body:
    type: json
    data: // /api/v1/schemas/{id}/templates/{templateName}/anps/{anpName}/epgs/{epgName}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
