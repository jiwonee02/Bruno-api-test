info:
  name: List all the Links in the Fabric
  type: http
  seq: 4

http:
  method: GET
  url: https://{{server-address}}/appcenter/cisco/ndfc/api/v1/lan-fabric/rest/control/links/fabrics/:fabricName
  headers:
    - name: cookie
      value: AuthCookie={{token}}
  params:
    - name: fabricName
      value: FC_sw
      type: path
  body:
    type: json
    data: // /api/v1/schemas/{id}/templates/{templateName}/anps/{anpName}/epgs/{epgName}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
