info:
  name: Get the Link for linkUUID
  type: http
  seq: 8

http:
  method: GET
  url: https://{{server-address}}/appcenter/cisco/ndfc/api/v1/lan-fabric/rest/control/links/:linkUUID
  headers:
    - name: cookie
      value: AuthCookie={{token}}
  params:
    - name: linkUUID
      value: LINK-UUID-25750
      type: path
  body:
    type: json
    data: // /api/v1/schemas/{id}/templates/{templateName}/anps/{anpName}/epgs/{epgName}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
