info:
  name: Get Custom Range Chart Data by switch interface DbId
  type: http
  seq: 43

http:
  method: GET
  url: https://{{server-address}}/appcenter/cisco/ndfc/api/v1/pm/stat/pmCustomChartDataBySpDbId?interfaceDbId=-1&startTime=-1&endTime=-1&isSAN=true
  headers:
    - name: cookie
      value: AuthCookie={{token}}
  params:
    - name: interfaceDbId
      value: "-1"
      type: query
    - name: startTime
      value: "-1"
      type: query
    - name: endTime
      value: "-1"
      type: query
    - name: isSAN
      value: "true"
      type: query
  body:
    type: json
    data: // /api/v1/schemas/{id}/templates/{templateName}/anps/{anpName}/epgs/{epgName}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
