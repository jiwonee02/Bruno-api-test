info:
  name: Get ALL Isls From Statistics Table
  type: http
  seq: 36

http:
  method: GET
  url: https://{{server-address}}/appcenter/cisco/ndfc/api/v1/pm/stat/islStat
  headers:
    - name: cookie
      value: AuthCookie={{token}}
  params:
    - name: inerval
      value: 24 Hours
      type: query
      disabled: true
    - name: navId
      value: "-1"
      type: query
      disabled: true
    - name: networkType
      value: Data Center
      type: query
      disabled: true
  body:
    type: json
    data: // /api/v1/schemas/{id}/templates/{templateName}/anps/{anpName}/epgs/{epgName}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
