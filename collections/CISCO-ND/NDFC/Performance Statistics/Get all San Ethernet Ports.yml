info:
  name: Get all San Ethernet Ports
  type: http
  seq: 5

http:
  method: GET
  url: https://{{server-address}}/appcenter/cisco/ndfc/api/v1/pm/stat/SanGigEStat
  headers:
    - name: cookie
      value: AuthCookie={{token}}
  params:
    - name: interval
      value: Day
      type: query
      disabled: true
    - name: navId
      value: "-1"
      type: query
      disabled: true
    - name: interfaceDbId
      value: "-1"
      type: query
      disabled: true
  body:
    type: json
    data: // /api/v1/schemas/{id}/templates/{templateName}/anps/{anpName}/epgs/{epgName}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
