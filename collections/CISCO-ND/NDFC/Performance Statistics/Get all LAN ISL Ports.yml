info:
  name: Get all LAN ISL Ports
  type: http
  seq: 37

http:
  method: GET
  url: https://{{server-address}}/appcenter/cisco/ndfc/api/v1/pm/stat/lanIslStat?interval=Day&navId=-1
  headers:
    - name: cookie
      value: AuthCookie={{token}}
  params:
    - name: interval
      value: Day
      type: query
    - name: navId
      value: "-1"
      type: query
  body:
    type: json
    data: // /api/v1/schemas/{id}/templates/{templateName}/anps/{anpName}/epgs/{epgName}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
