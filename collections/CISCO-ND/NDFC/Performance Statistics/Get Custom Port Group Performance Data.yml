info:
  name: Get Custom Port Group Performance Data
  type: http
  seq: 9

http:
  method: GET
  url: https://{{server-address}}/appcenter/cisco/ndfc/api/v1/pm/stat/customPGStat?groupId=1
  headers:
    - name: cookie
      value: AuthCookie={{token}}
  params:
    - name: groupId
      value: "1"
      type: query
    - name: interval
      value: 24 Hours
      type: query
      disabled: true
  body:
    type: json
    data: // /api/v1/schemas/{id}/templates/{templateName}/anps/{anpName}/epgs/{epgName}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
