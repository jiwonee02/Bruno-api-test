info:
  name: Get all LAN Ethernet Ports filtered by switch ID List
  type: http
  seq: 3

http:
  method: GET
  url: https://{{server-address}}/appcenter/cisco/ndfc/api/v1/pm/stat/LanEthernetStatBySwIDs
  headers:
    - name: cookie
      value: AuthCookie={{token}}
  params:
    - name: interval
      value: Day
      type: query
      disabled: true
    - name: swIds
      value: ""
      type: query
      disabled: true
  body:
    type: json
    data: // /api/v1/schemas/{id}/templates/{templateName}/anps/{anpName}/epgs/{epgName}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
