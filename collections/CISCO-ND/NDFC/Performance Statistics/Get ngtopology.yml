      value: "true"
      type: query
    - name: includeInterFabricLinks
      value: "true"
      type: query
    - name: renderInterFabricLinksAsCloud
      value: "true"
      type: query
    - name: hideUndiscoveredCloud
      value: "true"
      type: query
    - name: operationView
      value: "true"
      type: query
    - name: includeOperationalLinks
      value: "false"
      type: query
    - name: showHosts
      value: "false"
      type: query
  body:
    type: json
    data: // /api/v1/schemas/{id}/templates/{templateName}/anps/{anpName}/epgs/{epgName}
  auth: inherit

settings:
