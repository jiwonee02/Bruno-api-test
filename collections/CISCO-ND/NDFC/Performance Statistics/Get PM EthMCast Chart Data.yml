info:
  name: Get PM EthMCast Chart Data
  type: http
  seq: 21

http:
  method: GET
  url: https://{{server-address}}/appcenter/cisco/ndfc/api/v1/pm/stat/getPmEthMCastChartData?dn=&type
  headers:
    - name: cookie
      value: AuthCookie={{token}}
  params:
    - name: dn
      value: ""
      type: query
    - name: type
      value: ""
      type: query
    - name: interval
      value: "1"
      type: query
      disabled: true
  body:
    type: json
    data: // /api/v1/schemas/{id}/templates/{templateName}/anps/{anpName}/epgs/{epgName}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
