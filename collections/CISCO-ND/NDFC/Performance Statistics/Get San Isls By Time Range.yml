info:
  name: Get San Isls By Time Range
  type: http
  seq: 49

http:
  method: GET
  url: https://{{server-address}}/appcenter/cisco/ndfc/api/v1/pm/stat/sanIslStatByTimeRange
  headers:
    - name: cookie
      value: AuthCookie={{token}}
  params:
    - name: fid
      value: "10"
      type: query
      disabled: true
    - name: startTime
      value: now-1d
      type: query
      disabled: true
    - name: endTime
      value: now
      type: query
      disabled: true
  body:
    type: json
    data: // /api/v1/schemas/{id}/templates/{templateName}/anps/{anpName}/epgs/{epgName}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
