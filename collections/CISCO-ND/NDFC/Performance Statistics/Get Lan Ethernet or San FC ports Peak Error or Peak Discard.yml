info:
  name: Get Lan Ethernet or San FC ports Peak Error or Peak Discard
  type: http
  seq: 1

http:
  method: GET
  url: https://{{server-address}}/appcenter/cisco/ndfc/api/v1/pm/stat/ErrorDiscardStat
  headers:
    - name: cookie
      value: AuthCookie={{token}}
  params:
    - name: interval
      value: 24 Hours
      type: query
      disabled: true
    - name: navId
      value: "-1"
      type: query
      disabled: true
    - name: isLan
      value: "false"
      type: query
      disabled: true
    - name: isError
      value: "true"
      type: query
      disabled: true
  body:
    type: json
    data: // /api/v1/schemas/{id}/templates/{templateName}/anps/{anpName}/epgs/{epgName}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
