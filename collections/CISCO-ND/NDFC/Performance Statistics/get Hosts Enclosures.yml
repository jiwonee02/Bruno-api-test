info:
  name: get Hosts Enclosures
  type: http
  seq: 16

http:
  method: GET
  url: https://{{server-address}}/appcenter/cisco/ndfc/api/v1/pm/stat/getHostEnclList
  headers:
    - name: cookie
      value: AuthCookie={{token}}
  params:
    - name: interval
      value: 24 Hours
      type: query
      disabled: true
    - name: isHost
      value: "true"
      type: query
      disabled: true
    - name: name
      value: ""
      type: query
      disabled: true
  body:
    type: json
    data: // /api/v1/schemas/{id}/templates/{templateName}/anps/{anpName}/epgs/{epgName}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
