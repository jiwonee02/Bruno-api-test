info:
  name: Get Power Supply Usage Chart Data
  type: http
  seq: 46

http:
  method: GET
  url: https://{{server-address}}/appcenter/cisco/ndfc/api/v1/pm/stat/powerUsageChartData
  headers:
    - name: cookie
      value: AuthCookie={{token}}
  params:
    - name: switchId
      value: "-1"
      type: query
      disabled: true
    - name: physicalIndex
      value: "-1"
      type: query
      disabled: true
    - name: interval
      value: "1"
      type: query
      disabled: true
  body:
    type: json
    data: // /api/v1/schemas/{id}/templates/{templateName}/anps/{anpName}/epgs/{epgName}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
