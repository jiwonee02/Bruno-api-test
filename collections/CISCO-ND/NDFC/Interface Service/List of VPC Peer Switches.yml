info:
  name: List of VPC Peer Switches
  type: http
  seq: 6

http:
  method: GET
  url: https://{{server-address}}/appcenter/cisco/ndfc/api/v1/lan-fabric/rest/interface/switches/list
  headers:
    - name: cookie
      value: AuthCookie={{token}}
  params:
    - name: capability
      value: VPC_PEER_SWITCH
      type: query
      disabled: true
    - name: navId
      value: "101"
      type: query
      disabled: true
  body:
    type: json
    data: // /api/v1/schemas/{id}/templates/{templateName}/anps/{anpName}/epgs/{epgName}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
