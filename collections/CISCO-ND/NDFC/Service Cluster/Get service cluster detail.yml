info:
  name: Get service cluster detail
  type: http
  seq: 2

http:
  method: GET
  url: https://{{server-address}}/appcenter/cisco/ndfc/api/v1/l4l7-service/fabrics/:fabricName/service-clusters/:clusterName
  headers:
    - name: cookie
      value: AuthCookie={{token}}
  params:
    - name: fabricName
      value: FC_sw
      type: path
    - name: clusterName
      value: Cluster1
      type: path
  body:
    type: json
    data: // /api/v1/schemas/{id}/templates/{templateName}/anps/{anpName}/epgs/{epgName}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
