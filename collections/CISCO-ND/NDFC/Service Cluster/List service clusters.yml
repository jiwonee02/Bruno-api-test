info:
  name: List service clusters
  type: http
  seq: 1

http:
  method: GET
  url: https://{{server-address}}/appcenter/cisco/ndfc/api/v1/l4l7-service/fabrics/:fabricName/service-clusters
  headers:
    - name: cookie
      value: AuthCookie={{token}}
  params:
    - name: node-name
      value: Node1
      type: query
      disabled: true
    - name: attached-switch
      value: swSn1
      type: query
      disabled: true
    - name: fabricName
      value: FC_sw
      type: path
  body:
    type: json
    data: // /api/v1/schemas/{id}/templates/{templateName}/anps/{anpName}/epgs/{epgName}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
