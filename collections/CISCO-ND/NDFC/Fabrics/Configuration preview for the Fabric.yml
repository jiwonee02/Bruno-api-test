info:
  name: Configuration preview for the Fabric
  type: http
  seq: 14

http:
  method: GET
  url: https://{{server-address}}/appcenter/cisco/ndfc/api/v1/lan-fabric/rest/control/fabrics/:fabricName/config-preview
  headers:
    - name: cookie
      value: AuthCookie={{token}}
  params:
    - name: forceShowRun
      value: "false"
      type: query
      disabled: true
    - name: showBrief
      value: "false"
      type: query
      disabled: true
    - name: inclAllMSDSwitches
      value: "false"
      type: query
      disabled: true
    - name: shRunOptimization
      value: "true"
      type: query
      disabled: true
    - name: fabricName
      value: FC_sw
      type: path
  body:
    type: json
    data: // /api/v1/schemas/{id}/templates/{templateName}/anps/{anpName}/epgs/{epgName}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
