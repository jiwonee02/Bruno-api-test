info:
  name: Get Side by Side configuration difference
  type: http
  seq: 19

http:
  method: GET
  url: https://{{server-address}}/appcenter/cisco/ndfc/api/v1/lan-fabric/rest/control/fabrics/:fabricName/sidebysidediff/:switchId
  headers:
    - name: cookie
      value: AuthCookie={{token}}
  params:
    - name: forceShowRun
      value: "false"
      type: query
      disabled: true
    - name: fabricName
      value: FC_sw
      type: path
    - name: switchId
      value: 9Q9H9C9G1O5
      type: path
  body:
    type: json
    data: // /api/v1/schemas/{id}/templates/{templateName}/anps/{anpName}/epgs/{epgName}
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
