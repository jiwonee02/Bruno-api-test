      value: AuthCookie={{auth-cookie}}
  params:
    - name: schema-id
      value: 6821b68a20000068020910ce
      type: path
  body:
    type: json
    data: "/*\r

      {\r

      \    \"op\": \"add\",\r

      \    \"path\": \"/sites/-\",\r

